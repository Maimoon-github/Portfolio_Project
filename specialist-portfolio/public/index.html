<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Specialist Portfolio</title>
    <meta name="title" content="Specialist Portfolio" />
    <meta
      name="description"
      content="A modern portfolio showcasing specialized work and expertise"
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com/" />
    <meta property="og:title" content="Specialist Portfolio" />
    <meta
      property="og:description"
      content="A modern portfolio showcasing specialized work and expertise"
    />
    <meta property="og:image" content="https://yourdomain.com/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://yourdomain.com/" />
    <meta property="twitter:title" content="Specialist Portfolio" />
    <meta
      property="twitter:description"
      content="A modern portfolio showcasing specialized work and expertise"
    />
    <meta
      property="twitter:image"
      content="https://yourdomain.com/og-image.png"
    />

    <!-- PWA Support -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#ffffff" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  </head>
  <body>
    <!-- React application mount point -->
    <div id="root"></div>

    <!-- Entry script - Vite injects optimized assets during build -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- Fallback for users without JavaScript -->
    <noscript>
      <div
        style="
          text-align: center;
          padding: 2rem;
          font-family: system-ui, -apple-system, sans-serif;
        "
      >
        <h2>JavaScript Required</h2>
        <p>
          This application requires JavaScript to function properly. Please
          enable JavaScript in your browser settings.
        </p>
      </div>
    </noscript>
  </body>
</html>
